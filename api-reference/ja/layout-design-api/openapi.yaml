  /layout-designs/{designID}:
    get:
      tags:
        - 構成案設計
      summary: 構成案設計結果取得
      description: |-
        本APIでは指定された設計ID(designID)の設計情報を返却する。<br>
        返却されるレスポンスボディのstatusで設計状態を確認することができる。<br>
        statusがCOMPLETEDでない場合、designとconditionsには空のオブジェクト、proceduresには空のリストを返却する。<br>
        構成案設計要求で noCondition に true 指定されている場合、移行条件(conditions)の情報は省略され、conditions のキーがレスポンスボディに含まれなくなる。<br>
        サンプルプラグイン/サンプル設計機構を使用する場合、移行条件の算出はサポートされていないため、必ず空のオブジェクトが返却される。
      parameters:
        - name: designID
          in: path
          description: 設計ID。構成案設計要求時に受け取った設計IDを指定する。
          required: true
          example: 636ddde1ba39547845db0628
          schema:
            type: string
        - name: designEngine
          in: query
          description: |-
            利用する設計機構名を指定する。<br>
            未指定の場合は、構成案設計機能の設定ファイルに記載された設計機構名(plugin.defaultの値)が指定される。
          required: false
          schema:
            type: string
            default: sample_design_engine
      responses:
        "200":
          description: 正常
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CompletedDesignData"
                  - $ref: "#/components/schemas/FailedDesignData"
