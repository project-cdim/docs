openapi: 3.0.3
servers:
  - url: http://(host address)/cdim/api/v1
info:
  title: 構成案設計API
  description: |-
    Composable Disaggregated Infrastructureの構成案の設計を行う機能(設計機構)を管理する機能群
  version: 0.2.0
tags:
  - name: 構成案設計
    description: |-
      構成案設計に関する機能群
paths:
  /layout-designs:
    post:
      summary: 構成案設計要求
      description: |-
        本APIでは構成案設計要求を受け付けて設計ID(designID)を返却する。<br>
        返却された設計IDを指定して構成案設計結果取得API「GET /layout-designs/{designID}」を実行することで設計状態および設計結果を取得することができる。<br>
        サンプルプラグイン/サンプル設計機構を使用する場合、仕様により以下の機能がサポートされていない。<br>
          - serviceSetRequestResourcesで要求されたデバイスが接続されたノードが作成されるが、要求されたデバイスの性能情報は考慮されない。<br>
          - noConditionにfalseを指定して設計要求を行った場合でも、移行条件の算出はサポートされていないため、設計結果のconditionsには常に空のオブジェクトが返却される。<br>
          - 部分設計要求はサポートされないため、設計要求の内容にかかわらず、必ず入力されたすべてのノードの再設計が行われる。<br>
      tags:
        - 構成案設計
      parameters:
        - name: designEngine
          in: query
          description: |-
            利用する設計機構名を指定する。<br>
            未指定の場合は、構成案設計機能の設定ファイルに記載された設計機構名(plugin.defaultの値)が指定される。
          required: false
          schema:
            type: string
            default: sample_design_engine
      deprecated: false
      requestBody:
        description: 設計クエリ
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestBody"
      responses:
        "202":
          description: 正常
          content:
            application/json:
              schema:
                properties:
                  designID:
                    type: string
                    description: 設計ID
                    example: 636ddde1ba39547845db0628
        "400":
          description: 不正なリクエストボディ。
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: エラーコード
                    enum:
                      - E20001
                  message:
                    type: string
                    description: メッセージ
                    enum:
                      - Following request body are required <不足パラメータ>
        "500":
          description: |-
            内部サーバーエラー、他コンポーネントのエラー、またはプラグイン処理のエラーが発生。
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: エラーコード
                    enum:
                      - E20004
                  message:
                    type: string
                    description: メッセージ
                    enum:
                      - Failed to load layoutdesign_config.yaml.
    get:
      summary: 設計結果一覧取得
      description: |-
        本APIでは要求時点で設計機構に保存されている設計結果の一覧を返却する。<br>
        サンプルプラグイン/サンプル設計機構を使用する場合、仕様により以下の機能がサポートされていない。<br>
          - 直近1件の設計結果のみを保持するため、limit/offset/sortBy/orderBy/statusのクエリパラメータはサポートされない。<br>
          - fieldsクエリパラメータで返却される情報のフィルタリングは行われず、設計結果に常にdesign/conditions/proceduresすべての項目が含まれる。<br>
          - 移行条件(conditions)は算出されないため、必ず空の値が返却される。<br>
      tags:
        - 構成案設計
      parameters:
        - name: fields
          in: query
          description: |-
            レスポンスボディに含める設計結果の項目を指定するパラメータ。<br>
            複数の項目を指定することが可能。<br>
            未指定時には、構成案、移行条件、移行手順の情報を返却しない。<br>
            fieldsを指定した場合、取得対象項目として指定した項目が返却される。<br>
            また、取得対象項目として指定しない項目はキーごとレスポンスボディから除外される。
            - design:構成案
            - conditions:移行条件
            - procedures:移行手順
          required: false
          schema:
            description: |-
              - design:構成案
              - conditions:移行条件
              - procedures:移行手順
            type: array
            items:
              type: string
              enum:
                - design
                - conditions
                - procedures
        - name: limit
          in: query
          description: |-
            取得件数を指定するパラメータ。<br>
            1以上の整数値を指定する。<br>
            設計要求日時(startedAt)の新しい順で指定した件数の構成案の情報を返却する。<br>
            未指定の場合は、デフォルトとして100件取得となる。<br>
            設計機構が保持している設計結果の件数が、limitで指定した件数に満たない場合、保持している分すべての設計結果を返却する。
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
        - name: offset
          in: query
          description: |-
            取得開始位置を指定するパラメータ。<br>
            sortBy、orderByの指定に従い並び替えを行ったデータの指定した行から取得を行う。<br>
            0以上の整数値を指定する。<br>
            仮に100を指定した場合は、101件目以降の構成案を取得する。<br>
            未指定時には、デフォルトとして1件目から取得する。<br>
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: sortBy
          in: query
          description: |-
            ソート対象を指定するパラメータ。<br>
            昇順・降順で並び替える項目を指定する。<br>
            未指定時にはデフォルトとして設計要求日時(startedAt)が対象となる。
            - startedAt: 設計要求日時
            - endedAt: 設計終了日時
          required: false
          schema:
            type: string
            default: startedAt
        - name: orderBy
          in: query
          description: |-
            取得した設計結果の順序を指定するパラメータ。<br>
            未指定時にはデフォルトとして降順(desc)を指定する。<br>
            - asc: 昇順
            - desc: 降順
          required: false
          schema:
            type: string
            default: desc
        - name: status
          in: query
          description: |-
            取得する構成案の設計状態を指定するパラメータ。<br>
            複数のパラメータ指定が可能。<br>
            未指定時にはデフォルトとしてすべての設計状態が指定される。
            - COMPLETED: 構成案設計完了
            - IN_PROGRESS: 構成案設計中
            - FAILED: 構成案設計失敗
            - CANCELING: 構成案設計キャンセル中
            - CANCELED: 構成案設計キャンセル完了
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - COMPLETED
                - IN_PROGRESS
                - FAILED
                - CANCELING
                - CANCELED
        - name: designEngine
          in: query
          description: |-
            利用する設計機構名を指定する。<br>
            未指定の場合は、構成案設計機能の設定ファイルに記載された設計機構名(plugin.defaultの値)が指定される。
          required: false
          schema:
            type: string
            default: sample_design_engine
      responses:
        "200":
          description: 正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletedDesignDatas"
              examples:
