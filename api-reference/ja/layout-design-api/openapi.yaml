                    enum:
                      - Failed to load layoutdesign_config.yaml.

    put:
      tags:
        - 構成案設計
      summary: 構成案設計キャンセル
      description: |-
        本APIでは指定された設計ID(designID)の構成案設計処理の設計状態をキャンセルへ遷移する要求を行う。<br>
        構成案設計結果取得API「GET /layout-designs/{designID}」を実行し現在の設計状態を取得することで、設計状態が遷移したことを確認することができる。<br>
        サンプルプラグイン/サンプル設計機構では、本APIの機能はサポートされていないため、設計状態がCANCELINGまたはCANCELEDに遷移することなく、常にHTTP 500エラーを返却する。
      parameters:
        - name: designID
          in: path
          description: 設計ID。構成案設計要求時に受け取った設計IDを指定する。
          required: true
          example: 636ddde1ba39547845db0628
          schema:
            type: string
        - name: action
          in: query
          description: |-
            設計機構に要求するアクション種別を指定するパラメータ。
            - cancel: 構成案設計処理をキャンセル要求する。
          required: true
          schema:
            type: string
            enum:
              - cancel
        - name: designEngine
          in: query
          description: |-
            利用する設計機構名を指定する。<br>
            未指定の場合は、構成案設計機能の設定ファイルに記載された設計機構名(plugin.defaultの値)が指定される。
          required: false
          schema:
            type: string
            default: sample_design_engine
      responses:
        "200":
          description: 正常。既に設計状態の遷移が完了している場合。
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    description: 現在の設計状態
                    enum:
                      - "CANCELED"
        "202":
          description: 正常。設計状態の遷移の要求が受け付けられた場合。
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    description: 現在の設計状態
                    enum:
                      - "CANCELING"
        "400":
          description: 不正なクエリパラメータ指定。
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: エラーコード
                    enum:
                      - E20001
                  message:
                    type: string
                    description: メッセージ
                    enum:
                      - "Invalid value is specified for query parameters. query name: action"
        "404":
          description: 存在しない設計IDが指定された。
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: エラーコード
                    enum:
                      - E20009
                  message:
                    type: string
                    description: メッセージ
                    enum:
                      - "Error was returned from design engine. Design ID Not Found: Design ID not found"
        "409":
          description: 現在の設計状態から遷移ができない場合。
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: エラーコード
                    enum:
                      - E20009
                  message:
                    type: string
                    description: メッセージ
                    enum:
                      - "Error was returned from design engine. Could Not Change Status: Current status is <現在の設計状態>"
        "500":
          description: |-
            内部サーバーエラー、他コンポーネントのエラー、またはプラグイン処理のエラーが発生。
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: エラーコード
                    enum:
                      - E20004
                  message:
                    type: string
                    description: メッセージ
                    enum:
                      - Failed to load layoutdesign_config.yaml.

    delete:
      tags:
        - 構成案設計
      summary: 構成案設計結果削除
      description: |-
        本APIでは指定された設計ID(designID)の構成案設計結果を削除する。<br>
        サンプルプラグイン/サンプル設計機構では、本APIの機能はサポートされていないため、設計結果は削除されることはなく、常にHTTP 500エラーを返却する。
      parameters:
        - name: designID
          in: path
          description: 設計ID。構成案設計要求時に受け取った設計IDを指定する。
          required: true
          example: 636ddde1ba39547845db0628
          schema:
            type: string
        - name: designEngine
          in: query
          description: |-
            利用する設計機構名を指定する。<br>
            未指定の場合は、構成案設計機能の設定ファイルに記載された設計機構名(plugin.defaultの値)が指定される。
          required: false
          schema:
            type: string
            default: sample_design_engine

      responses:
        "204":
          description: 正常
        "404":
          description: 存在しない設計IDが指定された。
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: エラーコード
                    enum:
                      - E20009
                  message:
                    type: string
                    description: メッセージ
                    enum:
                      - "Error was returned from design engine. Design ID Not Found: Design ID not found"
        "500":
          description: |-
            内部サーバーエラー、他コンポーネントのエラー、またはプラグイン処理のエラーが発生。
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: エラーコード
                    enum:
                      - E20004
                  message:
                    type: string
                    description: メッセージ
                    enum:
                      - Failed to load layoutdesign_config.yaml.

