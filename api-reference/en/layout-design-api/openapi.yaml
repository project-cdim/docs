openapi: 3.0.3
servers:
  - url: http://(host address)/cdim/api/v1
info:
  title: Layout Design API
  description: |-
    A suite of functions for designing layouts (design engine) for the managed Composable Disaggregated Infrastructure
  version: 0.2.0
tags:
  - name: Layout Design
    description: |-
      A suite of functions related to layout design
paths:
  /layout-designs:
    post:
      summary: Layout Design Request
      description: |-
        Accepts a layout design request and returns a Design ID (designID).<br>
        You can obtain the design status and results by specifying the returned Design ID and executing the Get Layout Design Result API "GET /layout-designs/{designID}".<br>
        When you use the sample plugin/sample design engine, the following functions are not supported due to specifications.<br>
          - A node to which the device requested in serviceSetRequestResources is connected is created, but the performance information of the requested device is not taken into account.<br>
          - Even if a design request is made with noCondition set to false, the calculation of migration conditions is not supported, so an empty object is always returned in the conditions of the design results.<br>
          - Since partial design requests are not supported, all input nodes are always redesigned regardless of the content of the design request.<br>
      tags:
        - Layout Design
      parameters:
        - name: designEngine
          in: query
          description: |-
            Specifies the design engine name to use.<br>
            If omitted, the design engine name (the value of plugin.default) described in the configuration file of the layout design is used.
          required: false
          schema:
            type: string
            default: sample_design_engine
      deprecated: false
      requestBody:
        description: Design query
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestBody"
      responses:
        "202":
          description: Normal
          content:
            application/json:
              schema:
                properties:
                  designID:
                    type: string
                    description: Design ID
                    example: 636ddde1ba39547845db0628
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: Error code
                    enum:
                      - E20001
                  message:
                    type: string
                    description: Message
                    enum:
                      - Following request body are required <missing parameter>
        "500":
          description: |-
            An internal server error, an error from another component, or a plugin processing error occurred.
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: Error code
                    enum:
                      - E20004
                  message:
                    type: string
                    description: Message
                    enum:
                      - Failed to load layoutdesign_config.yaml.
    get:
      summary: List Layout Design Results
      description: |-
        Returns the list of layout design results stored in the design engine at the time of the request.<br>
        When you use the sample plugin/sample design engine, the following features are not supported by specification.<br>
          - Since only the most recent design result is retained, the query parameters limit, offset, sortBy, orderBy, and status are not supported.<br>
          - Information returned by the fields query parameter is not filtered, and the design result always includes all items: design, conditions, and procedures.<br>
          - Since migration conditions (conditions) are not calculated, an empty value is always returned.<br>
      tags:
        - Layout Design
      parameters:
        - name: fields
          in: query
          description: |-
            Parameter specifying which design result fields to include in the response body.<br>
            Multiple fields can be specified.<br>
            If omitted, information for design result, migration conditions, and migration procedures is not returned.<br>
            If fields is specified, only the specified fields are returned.<br>
            Fields that are not specified are excluded from the response body entirely (including the key).
            - design: design results
            - conditions: migration conditions
            - procedures: migration procedures
          required: false
          schema:
            description: |-
              - design: design results
              - conditions: migration conditions
              - procedures: migration procedures
            type: array
            items:
              type: string
              enum:
                - design
                - conditions
                - procedures
        - name: limit
          in: query
          description: |-
            Parameter specifying the number of results to retrieve.<br>
            Specify an integer greater than or equal to 1.<br>
            Returns the specified number of results ordered by design request time (startedAt) from newest to oldest.<br>
            If omitted, the default is 100 results.<br>
            If the number of stored design results is less than the value specified by limit, all stored design results are returned.
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
        - name: offset
          in: query
          description: |-
            Parameter specifying the start position for retrieval.<br>
            Retrieves data starting from the specified row after sorting according to sortBy and orderBy.<br>
            Specify an integer greater than or equal to 0.<br>
            For example, if 100 is specified, results from the 101st item onward are returned.<br>
            If omitted, the default is 0 (start from the first item).<br>
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: sortBy
          in: query
          description: |-
            Parameter specifying the sort target.<br>
            Specifies the field to be sorted in ascending/descending order.<br>
            If omitted, the design request time (startedAt) is used by default.
            - startedAt: Design request time
            - endedAt: Design end time
          required: false
          schema:
            type: string
            default: startedAt
        - name: orderBy
          in: query
          description: |-
            Parameter specifying the order of retrieved design results.<br>
            If omitted, descending order (desc) is used by default.<br>
            - asc: Ascending
            - desc: Descending
          required: false
          schema:
            type: string
            default: desc
        - name: status
          in: query
          description: |-
            Parameter specifying the design status to retrieve.<br>
            Multiple values can be specified.<br>
            If omitted, all design statuses are selected by default.
            - COMPLETED: Design completed
            - IN_PROGRESS: Design in progress
            - FAILED: Design failed
            - CANCELING: Design canceling
            - CANCELED: Design canceled
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - COMPLETED
                - IN_PROGRESS
                - FAILED
                - CANCELING
                - CANCELED
        - name: designEngine
          in: query
          description: |-
            Specifies the design engine name to use.<br>
            If omitted, the design engine name (the value of plugin.default) described in the configuration file of the layout design is used.
          required: false
          schema:
            type: string
            default: sample_design_engine
      responses:
        "200":
          description: Normal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletedDesignDatas"
              examples:
