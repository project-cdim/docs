  /layout-designs/{designID}:
    get:
      tags:
        - Layout Design
      summary: Get Layout Design Result
      description: |-
        Returns layout design result for the specified Design ID (designID).<br>
        You can check the design status via the status field in the response body.<br>
        If status is not COMPLETED, an empty object is returned for design and conditions, and an empty list is returned for procedures.<br>
        If noCondition is set to true in the Layout Design Request, migration conditions (conditions) are omitted and the conditions key is not included in the response body.<br>
        When you use the sample plugin/sample design engine, calculation of migration conditions is not supported, so an empty object is always returned.
      parameters:
        - name: designID
          in: path
          description: Design ID. Specify the Design ID received from the Layout Design Request.
          required: true
          example: 636ddde1ba39547845db0628
          schema:
            type: string
        - name: designEngine
          in: query
          description: |-
            Specifies the design engine name to use.<br>
            If omitted, the design engine name (the value of plugin.default) described in the configuration file of the layout design feature is used.
          required: false
          schema:
            type: string
            default: sample_design_engine
      responses:
