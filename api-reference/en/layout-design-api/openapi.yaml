    put:
      tags:
        - Layout Design
      summary: Cancel Layout Design
      description: |-
        Requests the design engine to transition the design status of the specified Design ID (designID) to CANCELING.<br>
        You can confirm the status transition by executing the Get Layout Design Result API "GET /layout-designs/{designID}" and checking the current design status.<br>
        In the sample plugin/sample design engine, this API function is not supported, so it always returns an HTTP 500 error without transitioning the design status to CANCELING or CANCELED.
      parameters:
        - name: designID
          in: path
          description: Design ID. Specify the Design ID received from the Layout Design Request.
          required: true
          example: 636ddde1ba39547845db0628
          schema:
            type: string
        - name: action
          in: query
          description: |-
            Parameter specifying the action type to request to the design engine.
            - cancel: Requests cancellation of the layout design processing.
          required: true
          schema:
            type: string
            enum:
              - cancel
        - name: designEngine
          in: query
          description: |-
            Specifies the design engine name to use.<br>
            If omitted, the design engine name (the value of plugin.default) described in the configuration file of the layout design feature is used.
          required: false
          schema:
            type: string
            default: sample_design_engine
      responses:
        "200":
          description: Normal. When the layout design process has already been canceled.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    description: Current design status
                    enum:
                      - "CANCELED"
        "202":
          description: Normal. When the request to transition the design status has been accepted.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    description: Current design status
                    enum:
                      - "CANCELING"
        "400":
          description: Invalid query parameter specification.
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: Error code
                    enum:
                      - E20001
                  message:
                    type: string
                    description: Message
                    enum:
                      - "Invalid value is specified for query parameters. query name: action"
        "404":
          description: The specified designID does not exist.
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: Error code
                    enum:
                      - E20009
                  message:
                    type: string
                    description: Message
                    enum:
                      - "Error was returned from design engine. Design ID Not Found: Design ID not found"
        "409":
          description: Transition is not allowed from the current design status.
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: Error code
                    enum:
                      - E20009
                  message:
                    type: string
                    description: Message
                    enum:
                      - "Error was returned from design engine. Could Not Change Status: Current status is <current design status>"
        "500":
          description: |-
            An internal server error, an error from another component, or a plugin processing error occurred.
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: number
                    description: Error code
                    enum:
                      - E20004
                  message:
                    type: string
                    description: Message
                    enum:
                      - Failed to load layoutdesign_config.yaml.

    delete:
      tags:
        - Layout Design
      summary: Delete Layout Design Result
      description: |-
        Deletes the layout design result for the specified Design ID (designID).<br>
        In the sample plugin/sample design engine, this API function is not supported, so design results are never deleted and an HTTP 500 error is always returned.
      parameters:
        - name: designID
          in: path
          description: Design ID. Specify the Design ID received from the Layout Design Request.
          required: true
          example: 636ddde1ba39547845db0628
          schema:
            type: string
        - name: designEngine
          in: query
          description: |-
            Specifies the design engine name to use.<br>
            If omitted, the design engine name (the value of plugin.default) described in the configuration file of the layout design feature is used.
          required: false
          schema:
            type: string
            default: sample_design_engine

      responses:
        "204":
